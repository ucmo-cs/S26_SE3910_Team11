# ─────────────────────────────────────────────
# Commerce Bank Appointment System
# ─────────────────────────────────────────────

# Server
server.port=8080

# DataSource — override via environment variables in production
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/commercebank}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Rate limiting (appointments per email / IP per hour)
app.rate-limit.email-per-hour=3
app.rate-limit.ip-per-hour=5

# Employee passwords — SHA-256 hex hashes
# Staff:  "Mul3$!26"  →  1fc1953af748f9a78b82a172142930455642698588d23fba82a23cf5b3892370
# Admin:  set your own hash here; override via env in prod
app.auth.staff-hash=${STAFF_HASH:1fc1953af748f9a78b82a172142930455642698588d23fba82a23cf5b3892370}
app.auth.admin-hash=${ADMIN_HASH:5fe88dc0ae077885a977eaa1a8a1da31d6f305c6074053cab564400ec0bee667}

# CORS — allow the React front-end (adjust in production)
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

# Logging
logging.level.com.commercebank=INFO
logging.level.org.springframework.security=WARN

# ─── Chat (OpenAI-compatible) ─────────────────────────────────────
# Set CHAT_API_KEY env var to enable the chat assistant
app.chat.api-key=${CHAT_API_KEY:}
app.chat.api-url=${CHAT_API_URL:https://api.openai.com/v1/chat/completions}
app.chat.model=${CHAT_MODEL:gpt-4o-mini}
